name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  sdk-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pipx install uv
      - name: Run SDK tests
        working-directory: sdk/agentforge
        run: uv run --with pydantic --with httpx --with pytest python -m pytest tests -q

  control-plane-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pipx install uv
      - name: Run control-plane tests
        run: uv run --with pytest --with fastapi --with pydantic python -m pytest services/control_plane/tests -q

  observability-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pipx install uv
      - name: Run observability tests
        run: uv run --with pytest --with fastapi --with pydantic python -m pytest services/observability/tests -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check (warnings only, non-blocking)
        run: ruff check sdk/agentforge/agentforge services/control_plane || true
