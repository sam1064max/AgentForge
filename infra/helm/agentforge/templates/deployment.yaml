apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentforge-control-plane
  labels:
    app.kubernetes.io/name: agentforge-control-plane
    app.kubernetes.io/part-of: agentforge
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentforge-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentforge-control-plane
        app.kubernetes.io/part-of: agentforge
    spec:
      containers:
        - name: control-plane
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
{{ toYaml .Values.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: agentforge-control-plane
  labels:
    app.kubernetes.io/name: agentforge-control-plane
    app.kubernetes.io/part-of: agentforge
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: agentforge-control-plane
